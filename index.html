<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-a-Sketch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div>
            <h1>Etch-a-Sketch</h1>
            <p>A simple sketch pad application.</p>
        </div>
    </header>
    <div class="container">

    </div>
    <div>
        <div class="buttons">
            <div>
                <label for="user-input">Enter Grid Size:</label>
                <input type="text" id="user-input" placeholder="16">
                <button id="sizeButton">Set Size</button>
            </div>
            
            <button id="clearButton">Clear</button>
        </div>
    </div>
    <script src="Java.js"></script>
</body>
</html>
